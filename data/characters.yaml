# One entry per product. `category` must match an `id` in areas.yaml.
# `image_path` is where you save the ChatGPT (GPT Image 2) output — until
# that file exists, the generator falls back to a plain color+initial disc.
# `prompt` is kept here so any character can be regenerated or tweaked later
# without re-deriving the art direction from scratch.
#
# Shared art direction (repeated as a prefix in every prompt so each
# generation call is self-contained and can be pasted individually):
#   Flat-shaded chibi mascot character illustration. A soft, rounded,
#   fluffy cloud/brain-shaped creature body with thick clean black
#   outlines and soft cel-shading. Simple two-dot eyes and a small
#   friendly smile. Single character, full body, centered, facing
#   forward at a slight 3/4 angle. Plain flat light cream background,
#   no shadow, isolated illustration suitable for cutting out, no text,
#   no logos, no watermark.
#
# brand_color sourcing (2026-07-19):
#   Claude  #D97757 — Anthropic's actual app/icon color (user-provided).
#   GPT     #74AA9C — extracted from the ChatGPT logo mark itself
#                     (brandcolorcode.com); OpenAI has no published hex
#                     for the mark, this is the closest independent match.
#   Gemini  #3186FF — literal fill value of the blue ellipses forming the
#                     right point of the star in the official Gemini SVG
#                     (references/Google_Gemini_logo_2025.svg), confirmed
#                     by reading the source markup directly.
#
# Character art workflow update (2026-07-19): forcing exact brand_color
# hex codes into a from-scratch text-to-image prompt looked off in
# practice. The new approach is image-to-image: crop the character out
# of the original illustrations (saved under references/*-source-crop.png)
# and feed that crop into ChatGPT, keeping it close to the original
# rather than re-deriving it from a text description. `prompt` fields
# below are updated per-entity as each one is redone this way; entries
# not yet redone still carry the old scratch-generation prompt.

